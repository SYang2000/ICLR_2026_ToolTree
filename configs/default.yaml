# Default ToolTree configuration
# Hyperparameters from Appendix B.4

mcts:
  exploration_constant: 1.4     # lambda in UCT formula (Eq. 1)
  max_rollouts: 60              # R_max
  tau_pre: 0.3                  # Pre-pruning threshold
  tau_post: 0.4                 # Post-pruning threshold
  early_stop_delta: 0.001       # Min Q improvement for early stop
  early_stop_patience: 10       # Consecutive rollouts with no improvement
  max_depth: 15                 # Max tool chain length

planner_llm:
  model_name: "gpt-4o"
  temperature: 0.0
  max_tokens: 1024

judge_llm:
  model_name: "gpt-4o"
  temperature: 0.0
  max_tokens: 512

tool_retrieval_k: 20
data_path: "data/"
output_path: "outputs/"
