# ToolBench benchmark configuration
# Open-set: 16,464 APIs, retrieval-then-planning

benchmark: "toolbench"

mcts:
  exploration_constant: 1.4
  max_rollouts: 60
  tau_pre: 0.3
  tau_post: 0.4
  early_stop_delta: 0.001
  early_stop_patience: 10
  max_depth: 15

planner_llm:
  model_name: "gpt-4o"
  temperature: 0.0
  max_tokens: 1024

judge_llm:
  model_name: "gpt-4o"
  temperature: 0.0
  max_tokens: 512

tool_retrieval_k: 20
data_path: "data/toolbench/"
output_path: "outputs/toolbench/"
